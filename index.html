<!DOCTYPE html>
<html>
<head>
<title>Quiz</title>
</head>

<body style="text-align:center; font-family:Arial;">

<h2 id="q"></h2>
<div id="a"></div>

<script>
let step = 0;

const quiz = [
{q:"2,4,8,16,?", a:["18","32","24"]},
{q:"5x6?", a:["30","25","20"]},
{q:"Biggest animal?", a:["Elephant","Blue Whale","Shark"]}
];

function load(){
document.getElementById("q").innerText = quiz[step].q;
let html="";
quiz[step].a.forEach(x=>{
html+=`<button onclick="next()">${x}</button><br><br>`;
});
document.getElementById("a").innerHTML=html;
}

function next(){
step++;
if(step<quiz.length){
load();
}else{
window.location.href="loading.html";
}
}

load();
</script>

</body>
</html>
