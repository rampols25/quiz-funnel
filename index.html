<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IQ Challenge</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#fafaf7;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card {
  background:#fff;
  padding:25px;
  border-radius:15px;
  max-width:500px;
  width:100%;
  text-align:center;
}
button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.btn {background:#d95f2b;color:#fff;}
.share {background:#1877f2;color:#fff;}
</style>
</head>

<body>

<div class="card">
  <h2 id="title">IQ Challenge</h2>
  <p id="question">Loading...</p>

  <div id="options"></div>

  <button class="btn" id="start">Start Quiz</button>

  <div id="result" style="display:none;">
    <h2 id="result-title"></h2>
    <p id="result-sub"></p>

    <!-- LOCK -->
    <div id="lock">
      <p>🔒 Full Analysis Locked</p>
      <button class="btn" id="unlock">Unlock Results</button>
      <button class="share" id="share">Share & Challenge</button>
    </div>

    <!-- REAL -->
    <div id="final" style="display:none;"></div>
  </div>
</div>

<script>
let questions = [];
let current = 0;
let score = 0;

/* FETCH REAL QUESTIONS */
async function loadQuiz(){
  const res = await fetch("https://opentdb.com/api.php?amount=5&type=multiple");
  const data = await res.json();
  questions = data.results;
}

document.getElementById("start").onclick = async ()=>{
  document.getElementById("start").style.display="none";
  await loadQuiz();
  showQ();
};

function decode(str){
  let txt = document.createElement("textarea");
  txt.innerHTML = str;
  return txt.value;
}

function showQ(){
  let q = questions[current];
  document.getElementById("question").innerText = decode(q.question);

  let opts = [...q.incorrect_answers, q.correct_answer]
    .sort(()=>Math.random()-0.5);

  let container = document.getElementById("options");
  container.innerHTML="";

  opts.forEach(o=>{
    let b = document.createElement("button");
    b.innerText = decode(o);

    b.onclick = ()=>{
      if(o === q.correct_answer) score++;
      current++;
      if(current < questions.length) showQ();
      else showResult();
    };

    container.appendChild(b);
  });
}

/* RESULT */
function showResult(){
  document.getElementById("options").style.display="none";
  document.getElementById("question").style.display="none";
  document.getElementById("result").style.display="block";

  let pct = Math.round((score / questions.length)*100);

  let rank = pct >= 80 ? "Top 10% 🏆"
           : pct >= 60 ? "Top 30% 🔥"
           : "Better than most 👍";

  document.getElementById("result-title").innerText = rank;
  document.getElementById("result-sub").innerText =
    "Your brain score is ready… unlock to see full breakdown 👀";

  document.getElementById("final").innerText =
    "You scored " + pct + "% (" + score + "/" + questions.length + ")";

  /* AUTO REDIRECT (BIG MONEY) */
  setTimeout(()=>{
    window.location.href="https://wringincriminate.com/k42m2hfvnc?key=03608ead3fdec14b4c04962bd4f3c1ed";
  }, 9000);
}

/* UNLOCK */
document.getElementById("unlock").onclick = ()=>{
  window.open("https://wringincriminate.com/k42m2hfvnc?key=03608ead3fdec14b4c04962bd4f3c1ed","_blank");

  setTimeout(()=>{
    document.getElementById("lock").style.display="none";
    document.getElementById("final").style.display="block";
  },1000);
};

/* SHARE */
document.getElementById("share").onclick = ()=>{
  let text = encodeURIComponent("I scored high on this IQ test 🤯 Can you beat me?");
  let url = encodeURIComponent(window.location.href);
  window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}&quote=${text}`);
};
</script>

<!-- ADSTERRA SCRIPT -->
<script src="https://wringincriminate.com/19/03/88/190388fcc4bc352f0c71ea04b90f6587.js"></script>

</body>
</html>
